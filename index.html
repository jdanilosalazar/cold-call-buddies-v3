<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e8e8f0;
      overflow: hidden;
      width: 220px;
    }

    #app {
      background: rgba(14, 14, 22, 0.93);
      border-radius: 18px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.07);
      margin: 8px;
      overflow: hidden;
    }

    /* ── Title bar ── */
    #titlebar {
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 10px 12px 2px;
    }

    #close-btn {
      -webkit-app-region: no-drag;
      width: 13px;
      height: 13px;
      background: #ff5f57;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      color: transparent;
      font-size: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s;
      line-height: 1;
    }
    #close-btn:hover { color: #7a0000; }

    /* ── Main content ── */
    #main {
      padding: 4px 14px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 9px;
    }

    /* ── Pet ── */
    #pet {
      width: 88px;
      height: 88px;
      object-fit: contain;
      user-select: none;
    }

    #pet.bounce {
      animation: bounce 0.35s ease;
    }

    #pet.celebrate {
      animation: celebrate 0.7s ease;
    }

    @keyframes bounce {
      0%   { transform: scale(1); }
      35%  { transform: scale(1.18) translateY(-4px); }
      65%  { transform: scale(0.94); }
      100% { transform: scale(1); }
    }

    @keyframes celebrate {
      0%   { transform: scale(1) rotate(0deg); }
      20%  { transform: scale(1.22) rotate(-10deg); }
      40%  { transform: scale(1.22) rotate(10deg); }
      60%  { transform: scale(1.12) rotate(-5deg); }
      80%  { transform: scale(1.12) rotate(5deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    /* ── Progress bar ── */
    #progress-wrap {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border-radius: 8px;
      height: 9px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      border-radius: 8px;
      background: linear-gradient(90deg, #6c63ff, #a48cff);
      transition: width 0.35s cubic-bezier(.4,0,.2,1), background 0.35s ease;
      width: 0%;
    }
    #progress-bar.warning { background: linear-gradient(90deg, #ff9f43, #ffd32a); }
    #progress-bar.done    { background: linear-gradient(90deg, #20bf6b, #43d98f); }

    /* ── Counter ── */
    #counter {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #fff;
      line-height: 1;
    }

    #counter .denom {
      font-size: 13px;
      font-weight: 400;
      color: rgba(255,255,255,0.35);
      margin-left: 3px;
    }

    /* ── Call button ── */
    #call-btn {
      width: 100%;
      padding: 11px;
      font-size: 15px;
      font-weight: 600;
      background: linear-gradient(135deg, #6c63ff, #a48cff);
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s, background 0.35s;
      -webkit-app-region: no-drag;
    }
    #call-btn:hover  { opacity: 0.88; }
    #call-btn:active { transform: scale(0.96); }
    #call-btn.done  { background: linear-gradient(135deg, #20bf6b, #43d98f); }

    /* ── Goal row ── */
    #goal-row {
      display: flex;
      gap: 6px;
      width: 100%;
      -webkit-app-region: no-drag;
    }

    #goal-input {
      flex: 1;
      padding: 6px 8px;
      font-size: 12px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #e8e8f0;
      text-align: center;
      outline: none;
      transition: border-color 0.15s;
    }
    #goal-input::placeholder { color: rgba(255,255,255,0.25); }
    #goal-input:focus { border-color: rgba(108,99,255,0.55); }

    #goal-btn {
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 600;
      background: rgba(108,99,255,0.15);
      border: 1px solid rgba(108,99,255,0.35);
      border-radius: 8px;
      color: #a48cff;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    #goal-btn:hover { background: rgba(108,99,255,0.3); }

    /* ── Stats toggle ── */
    #stats-toggle {
      width: 100%;
      padding: 5px;
      font-size: 11px;
      font-weight: 500;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 8px;
      color: rgba(255,255,255,0.35);
      cursor: pointer;
      -webkit-app-region: no-drag;
      transition: border-color 0.15s, color 0.15s;
      letter-spacing: 0.3px;
    }
    #stats-toggle:hover {
      border-color: rgba(255,255,255,0.22);
      color: rgba(255,255,255,0.65);
    }

    /* ── Stats panel ── */
    #stats-panel {
      width: 100%;
      display: none;
      flex-direction: column;
      gap: 10px;
    }
    #stats-panel.open { display: flex; }

    #stats-divider {
      width: 100%;
      height: 1px;
      background: rgba(255,255,255,0.07);
    }

    /* Bar chart */
    #chart-title {
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 6px;
    }

    #bars-wrap {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 60px;
    }

    .bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      height: 100%;
      justify-content: flex-end;
    }

    .bar-val {
      font-size: 8px;
      color: rgba(255,255,255,0.4);
      line-height: 1;
      min-height: 9px;
    }

    .bar {
      width: 100%;
      border-radius: 3px 3px 0 0;
      background: rgba(108,99,255,0.35);
      min-height: 2px;
    }
    .bar.today    { background: linear-gradient(180deg, #6c63ff, #a48cff); }
    .bar.goal-hit { background: linear-gradient(180deg, #20bf6b, #43d98f); }

    .bar-label {
      font-size: 9px;
      color: rgba(255,255,255,0.3);
      line-height: 1;
    }
    .bar-label.today { color: rgba(255,255,255,0.7); }

    /* Stats summary boxes */
    #stats-summary {
      display: flex;
      gap: 5px;
    }

    .stat-box {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 7px 4px;
      text-align: center;
    }

    .stat-val {
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }

    .stat-lbl {
      font-size: 8px;
      color: rgba(255,255,255,0.3);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-top: 3px;
    }

    .stat-box.streak .stat-val { color: #ff9f43; }

    /* Reset button */
    #reset-btn {
      width: 100%;
      padding: 5px;
      font-size: 11px;
      background: transparent;
      border: 1px solid rgba(255,80,80,0.18);
      border-radius: 8px;
      color: rgba(255,100,100,0.45);
      cursor: pointer;
      -webkit-app-region: no-drag;
      transition: border-color 0.15s, color 0.15s;
    }
    #reset-btn:hover {
      border-color: rgba(255,80,80,0.45);
      color: rgba(255,100,100,0.8);
    }
  </style>
</head>
<body>
  <div id="app">

    <div id="titlebar">
      <button id="close-btn">×</button>
    </div>

    <div id="main">
      <img id="pet" src="assets/idle.png" />

      <div id="progress-wrap">
        <div id="progress-bar"></div>
      </div>

      <div id="counter">0 <span class="denom">/ 20 calls</span></div>

      <button id="call-btn">+ Call</button>

      <div id="goal-row">
        <input id="goal-input" type="number" min="1" placeholder="New goal…" />
        <button id="goal-btn">Set</button>
      </div>

      <button id="stats-toggle">▾ Stats</button>

      <div id="stats-panel">
        <div id="stats-divider"></div>

        <div id="chart">
          <div id="chart-title">Last 7 Days</div>
          <div id="bars-wrap"></div>
        </div>

        <div id="stats-summary">
          <div class="stat-box">
            <div class="stat-val" id="stat-week">0</div>
            <div class="stat-lbl">Week</div>
          </div>
          <div class="stat-box">
            <div class="stat-val" id="stat-month">0</div>
            <div class="stat-lbl">Month</div>
          </div>
          <div class="stat-box">
            <div class="stat-val" id="stat-best">0</div>
            <div class="stat-lbl">Best</div>
          </div>
          <div class="stat-box streak">
            <div class="stat-val" id="stat-streak">0</div>
            <div class="stat-lbl">Streak</div>
          </div>
        </div>

        <button id="reset-btn">Reset today's count</button>
      </div>

    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
